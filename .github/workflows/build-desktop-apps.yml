name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: codex-switch-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact_path: |
              mac-installer/latest-mac.yml
              mac-installer/*.dmg
              mac-installer/*.zip
              mac-installer/*.blockmap
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact_path: |
              windows-installer/latest.yml
              windows-installer/*.exe
              windows-installer/*.zip
              windows-installer/*.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      PYTHON: python
      CODEX_SWITCH_UPDATE_BASE_URL: https://pub-1fc6be6e977a4adf8a928d5e615d8f54.r2.dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip pyinstaller

      - name: Require macOS signing certificate
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${CSC_LINK}" || -z "${CSC_KEY_PASSWORD}" ]]; then
            echo "::error::macOS updater releases must be signed with a stable certificate. Set repository secrets CSC_LINK and CSC_KEY_PASSWORD before publishing updates."
            exit 1
          fi

      - name: Set updater version
        shell: bash
        run: |
          VERSION="$(node -e '
            const pkg = require("./package.json");
            const refType = process.env.GITHUB_REF_TYPE;
            const refName = process.env.GITHUB_REF_NAME || "";
            if (refType === "tag" && /^v?\\d+\\.\\d+\\.\\d+([-.+].*)?$/.test(refName)) {
              console.log(refName.replace(/^v/, ""));
              process.exit(0);
            }
            const [major = "0", minor = "0", patch = "0"] = String(pkg.version).split(/[+-]/)[0].split(".");
            const runNumber = Number(process.env.GITHUB_RUN_NUMBER || 0);
            const nextPatch = (Number(patch) || 0) + runNumber;
            console.log(`${major}.${minor}.${nextPatch}`);
          ')"
          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build macOS app
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run ${{ matrix.script }}

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-switch-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}

  publish-updates:
    name: Publish updates to Cloudflare R2
    needs: build
    runs-on: ubuntu-latest
    env:
      CODEX_SWITCH_R2_BUCKET: codex-switch-updates
      CODEX_SWITCH_UPDATE_BASE_URL: https://pub-1fc6be6e977a4adf8a928d5e615d8f54.r2.dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: codex-switch-*
          merge-multiple: true

      - name: List release artifacts
        run: find release -maxdepth 1 -type f -print | sort

      - name: Publish release artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: CODEX_SWITCH_RELEASE_DIR=release npm run publish:updates
