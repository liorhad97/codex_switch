name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: dist:mac
          - name: Windows
            os: windows-latest
            script: dist:win

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      PYTHON: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip pyinstaller

      - name: Build app
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-switch-${{ matrix.name }}
          path: release/*
