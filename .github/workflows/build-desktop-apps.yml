name: Build desktop apps

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: codex-switch-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact_path: |
              mac-installer/*.dmg
              mac-installer/*.zip
              mac-installer/*.blockmap
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact_path: |
              windows-installer/*.exe
              windows-installer/*.zip
              windows-installer/*.blockmap
          - name: Linux
            os: ubuntu-latest
            script: dist:linux
            artifact_path: |
              linux-installer/*.AppImage
              linux-installer/*.zip
              linux-installer/*.blockmap

    env:
      PYTHON: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip pyinstaller

      - name: Set build version
        shell: bash
        run: |
          VERSION="$(node -e '
            const pkg = require("./package.json");
            const refType = process.env.GITHUB_REF_TYPE;
            const refName = process.env.GITHUB_REF_NAME || "";
            if (refType === "tag" && /^v?\\d+\\.\\d+\\.\\d+([-.+].*)?$/.test(refName)) {
              console.log(refName.replace(/^v/, ""));
              process.exit(0);
            }
            const [major = "0", minor = "0", patch = "0"] = String(pkg.version).split(/[+-]/)[0].split(".");
            const runNumber = Number(process.env.GITHUB_RUN_NUMBER || 0);
            const nextPatch = (Number(patch) || 0) + runNumber;
            console.log(`${major}.${minor}.${nextPatch}`);
          ')"
          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build macOS app
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos')
        run: npm run ${{ matrix.script }}

      - name: Build Windows app
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows')
        run: npm run ${{ matrix.script }}

      - name: Build Linux app
        if: runner.os == 'Linux' && (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux')
        run: npm run ${{ matrix.script }}

      - name: Smoke test Windows packaged app
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows')
        shell: pwsh
        run: ./scripts/windows-packaged-smoke.ps1

      - name: Smoke test Windows Electron UI from zip
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows')
        timeout-minutes: 4
        run: node scripts/windows-electron-ui-smoke.cjs

      - name: Upload installer artifacts
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          (inputs.platform == 'windows' && matrix.name == 'Windows') ||
          (inputs.platform == 'macos' && matrix.name == 'macOS') ||
          (inputs.platform == 'linux' && matrix.name == 'Linux')
        uses: actions/upload-artifact@v4
        with:
          name: codex-switch-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
